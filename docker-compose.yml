services:
  backend:
    build: ./backend
    container_name: app-backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  mcp:
    build: ./mcp
    container_name: app-mcp
    ports:
      - "8001:8001"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: app-frontend
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - backend
