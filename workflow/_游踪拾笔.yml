    - data:
        code: "import json\n\n\ndef main(retrieval_result) -> dict:\n    \"\"\"\n\
          \    从 Dify 知识检索结果中提取 content 字段，\n    只保留真正的写作规范文本。\n    \"\"\"\n\n   \
          \ if retrieval_result is None:\n        return {\"result\": \"\"}\n\n  \
          \  data = retrieval_result\n\n    # 如果传入的是字符串，尝试转成 JSON\n    if isinstance(retrieval_result,\
          \ str):\n        try:\n            data = json.loads(retrieval_result)\n\
          \        except Exception:\n            return {\"result\": retrieval_result.strip()}\n\
          \n    chunks = []\n\n    # Dify 知识检索常见输出：list[dict]\n    if isinstance(data,\
          \ list):\n        for item in data:\n            if isinstance(item, dict):\n\
          \                content = (\n                    item.get(\"content\")\n\
          \                    or item.get(\"text\")\n                    or item.get(\"\
          page_content\")\n                    or item.get(\"summary\")\n        \
          \        )\n                if content:\n                    chunks.append(str(content).strip())\n\
          \            elif isinstance(item, str):\n                chunks.append(item.strip())\n\
          \n    # 兜底：dict 类型\n    elif isinstance(data, dict):\n        for key in\
          \ [\"content\", \"text\", \"result\", \"output\"]:\n            value =\
          \ data.get(key)\n            if value:\n                chunks.append(str(value).strip())\n\
          \n    if not chunks:\n        return {\"result\": str(retrieval_result)}\n\
          \n    return {\n        \"result\": \"\\n\\n\".join(chunks)\n    }"
