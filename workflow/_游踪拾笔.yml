    - data:
        code: "import re\nimport json\n\n\ndef main(raw_text: str) -> dict:\n    \"\
          \"\"\n    清理创作 Agent 输出中的 <think>...</think>，\n    提取 JSON 字符串，供后续质量检查或后端解析使用。\n\
          \    \"\"\"\n\n    if raw_text is None:\n        raw_text = \"\"\n\n   \
          \ text = str(raw_text)\n\n    # 删除完整的 <think>...</think>\n    text = re.sub(r\"\
          <think>.*?</think>\\s*\", \"\", text, flags=re.DOTALL)\n\n    # 删除未闭合的 <think>\n\
          \    text = re.sub(r\"<think>.*\", \"\", text, flags=re.DOTALL)\n\n    #\
          \ 删除 Markdown 代码块\n    text = text.replace(\"```json\", \"\").replace(\"\
          ```\", \"\").strip()\n\n    # 尝试只截取最外层 JSON 对象\n    start = text.find(\"\
          {\")\n    end = text.rfind(\"}\")\n\n    if start != -1 and end != -1 and\
          \ end > start:\n        text = text[start:end + 1].strip()\n\n    # 尝试解析\
          \ JSON，成功则重新标准化输出\n    try:\n        obj = json.loads(text)\n\n        result\
          \ = {\n            \"generated_title\": str(obj.get(\"generated_title\"\
          , \"\")).strip(),\n            \"generated_content\": str(obj.get(\"generated_content\"\
          , \"\")).strip(),\n            \"tags\": str(obj.get(\"tags\", \"\")).strip(),\n\
          \            \"risk_note\": str(obj.get(\"risk_note\", \"\")).strip()\n\
          \        }\n\n        return {\n            \"result\": json.dumps(result,\
          \ ensure_ascii=False)\n        }\n\n    except Exception:\n        # 如果解析失败，先原样返回，后面质量检查\
          \ Agent 再修\n        return {\n            \"result\": text\n        }"
