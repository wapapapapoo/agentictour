          , \"河坊街逛街区和小吃店\")\n    text = text.replace(\"河坊街上逛吃小吃\", \"河坊街上逛街区和小吃店\"\
          )\n    text = text.replace(\"河坊街逛吃小吃\", \"河坊街逛街区和小吃店\")\n\n    text = text.replace(\"\
          小吃,\", \"小吃店,\")\n    text = text.replace(\"小吃，\", \"小吃店，\")\n    text =\
          \ text.replace(\"小吃\\n\", \"小吃店\\n\")\n    text = text.replace(\",小吃\\\"\
          \", \",小吃店\\\"\")\n\n    text = text.replace(\"两人旅行分享平台、微博旅行Vlog\", \"小红书、朋友圈、旅游笔记平台\"\
          )\n    text = text.replace(\"Instagram/小红书摄影配文\", \"小红书、朋友圈旅行配文\")\n\n \
          \   return text.strip()\n\n\ndef main(raw_text: str, material_summary: str\
          \ = \"\", content_type: str = \"\") -> dict:\n    if raw_text is None:\n\
          \        raw_text = \"\"\n\n    text = str(raw_text)\n\n    # 1. 删除 think\n\
          \    text = remove_think(text)\n\n    # 2. 提取 JSON\n    text = extract_json_text(text)\n\
          \n    # 3. 解析 JSON\n    try:\n        obj = json.loads(text)\n    except\
