        selected: false
        template: "【旅行素材卡】\r\n\r\n素材ID：{{ material_id }}\r\n用户ID：{{ user_id }}\r\n\
          \r\n一、基础信息\r\n素材标题：{{ title }}\r\n目的地：{{ destination }}\r\n旅行时间：{{ start_date\
          \ }} 至 {{ end_date }}\r\n同行人数：{{ people_count }}\r\n\r\n二、用户原始素材\r\n\r\n\
          1. 行程记录：\r\n{{ itinerary_text }}\r\n\r\n2. 美食记录：\r\n{{ food_text }}\r\n\r\
          \n3. 照片描述：\r\n用户手动填写的照片说明：\r\n{{ photo_text }}\r\n\r\n视觉模型对上传照片的识别结果：\r\n\
          {{ photo_analysis }}\r\n\r\n4. 消费摘要：\r\n{{ expense_text }}\r\n\r\n5. 个人感受：\r\
          \n{{ feeling_text }}\r\n\r\n三、生成配置\r\n生成类型：{{ content_type }}\r\n写作风格：{{\
          \ writing_style }}\r\n\r\n四、知识库召回的写作规范\r\n{{ writing_rules }}\r\n\r\n五、创作边界\r\
          \n1. 后续内容必须优先基于用户原始素材生成。\r\n2. 不得编造用户没有提供的景点、酒店、交通方式、消费金额、开放时间、票价和排队时间。\r\
          \n3. 某类文字素材为空时，可以参考可靠的照片识别结果，但不得根据图片进行过度推断。\r\n4. 普通湖景、寺庙、街道等画面，不能仅凭目的地背景认定为某个具体景点。\r\
          \n5. 不得根据图片推断同行人的关系、身份和具体情绪。\r\n6. 用户文字和图片识别结果冲突时，应采用更保守的表达，不得擅自拼接成新的事实。\r\
          \n7. 输出应符合生成类型和写作风格要求。"
