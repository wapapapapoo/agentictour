    - data:
        agent_parameters:
          instruction:
            type: constant
            value: '你是一个内容审核专家，你需要对你的队友的答复进行审核。

              在开始之前，先根据工具获取一下当前时间，并检查你有哪些工具可以调用。

              你会被告知用户的输入和队友的答复。

              你需要检查答复是否合理、是否满足用户需求。


              根据审核结果进行判断，如果当前审核不通过：

              如果当前轮次是"first"，你需要将输入和输出进行总结，然后叙述审核不通过的原因，同时并提出新的答复的要求，用于为队友纠错；

              如果是"second"，你需要向用户进行道歉，说明无法完成人物的原因。

              再进行修改建议时，有可能用户的输入与真实情况存在差异，你需要对此进行提醒，并要求你的队友的回复也必须包含这一步提醒


              你返回的内容应该是一个json格式，其中"reply"代表你回答的主要内容，"result"则是一个boolean，代表当前审核是否通过。'
          model:
            type: constant
            value:
              completion_params:
                response_format: json_object
                thinking: true
              mode: chat
              model: deepseek-v4-flash
              model_type: llm
              provider: langgenius/deepseek/deepseek
              type: model-selector
          query:
            type: constant
            value: "用户输入：{{#1783649676231.input#}}\n用户输出：{{#1783649676231.ai_readout#}}\n\
              当前伦次：{{#1783649676231.turn#}}\n审核步骤：\n第一步： 提取AI回复和用户输入中的事实性声明。 \n第二步：\
              \ 判断哪些声明需要外部数据验证。 \n第三步： 调用工具验证。\n第四步： 输出审核结果。"
          tools:
            type: constant
            value:
            - enabled: true
              extra:
                description: '查询指定城市或区县的天气。


                  适用场景：

                  - 需要获取今天/现在天气


                  参数：

                  - adcode: 高德行政区编码，例如上海 310000，北京 110000

                  - extensions: base 表示实况天气，all 表示天气预报'
              parameters:
                adcode:
                  auto: 1
                  value: null
                extensions:
                  auto: 1
                  value: null
              provider_name: travel-mcp
              provider_show_name: AI旅游MCP
              settings: {}
              tool_description: '查询指定城市或区县的天气。


                适用场景：

                - 用户问今天/现在天气

                - 用户问是否需要带伞

                - 用户问穿衣建议

                - 系统自动生成行前提醒


                参数：

                - adcode: 高德行政区编码，例如上海 310000，北京 110000

                - extensions: base 表示实况天气，all 表示天气预报'
              tool_label: amap_weather
              tool_name: amap_weather
              type: mcp
            - enabled: true
              extra:
                description: '查询当前位置附近的地点。


                  适用场景：

                  -需要查询附近的景点或者建筑


                  参数：

                  - location: 经纬度，格式为 经度,纬度，例如 116.397428,39.90923

                  - keywords: 搜索关键词，例如 餐厅、咖啡、厕所、商场

                  - types: 高德 POI 类型编码，可为空

                  - radius: 搜索半径，单位米

                  - page_size: 返回数量

                  - page_num: 页码'
              parameters:
                keywords:
                  auto: 1
                  value: null
                location:
                  auto: 1
