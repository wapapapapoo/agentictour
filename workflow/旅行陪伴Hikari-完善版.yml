    - data:
        code: "import json\nimport re\n\n\ndef _clean(text):\n    text = str(text or \"\").strip()\n    text = re.sub(r\"<think>.*?</think>\\s*\", \"\", text, flags=re.S)\n    text = re.sub(r\"^```(?:json)?\\s*|\\s*```$\", \"\", text, flags=re.I)\n    return text.strip()\n\n\ndef main(raw_text: str):\n    text = _clean(raw_text)\n    try:\n        payload = json.loads(text)\n    except Exception:\n        return {\"reply\": text or \"暂时无法生成可靠的调整方案。\", \"itinerary_items\": []}\n\n    if not isinstance(payload, dict):\n        return {\"reply\": \"暂时无法生成可靠的调整方案。\", \"itinerary_items\": []}\n    reply = str(payload.get(\"reply\") or \"已生成候选调整方案。\")\n    items = payload.get(\"itinerary_items\")\n    if not isinstance(items, list):\n        items = []\n    items = [item for item in items if isinstance(item, dict)]\n    return {\"reply\": reply, \"itinerary_items\": items}"
        code_language: python3
        desc: 规范化模型输出，保证后端获得稳定字段类型
