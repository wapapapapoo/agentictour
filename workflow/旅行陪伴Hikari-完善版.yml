    - data:
        code: "import json\nimport re\n\n\ndef _bool(value, default=True):\n    if isinstance(value, bool):\n        return value\n    if isinstance(value, str):\n        normalized = value.strip().lower()\n        if normalized == \"true\":\n            return True\n        if normalized == \"false\":\n            return False\n    return default\n\n\ndef main(raw_text: str):\n    text = str(raw_text or \"\").strip()\n    text = re.sub(r\"<think>.*?</think>\\s*\", \"\", text, flags=re.S)\n    text = re.sub(r\"^```(?:json)?\\s*|\\s*```$\", \"\", text, flags=re.I).strip()\n    try:\n        payload = json.loads(text)\n    except Exception:\n        return {\"reply\": text or \"自动检查输出无法解析。\", \"need_notify\": True}\n    if not isinstance(payload, dict):\n        return {\"reply\": \"自动检查输出无法解析。\", \"need_notify\": True}\n    return {\n        \"reply\": str(payload.get(\"reply\") or \"自动检查已完成。\"),\n        \"need_notify\": _bool(payload.get(\"need_notify\"), True),\n    }"
        code_language: python3
