    - data:
        agent_parameters:
          context:
            type: variable
            value:
            - '1782441291535'
            - json
          instruction:
            type: constant
            value: '你是 Hikari 的系统自动检查 Agent。目标不是定时刷存在感，而是判断未来待执行行程是否出现了需要用户采取行动的明确变化。


              检查依据：当前时间、未来行程、城市天气、当前位置和必要的路线信息。数据库只允许 SELECT。


              need_notify=true 的条件：

              - 景点闭馆、明显延迟、取消或营业时间与行程冲突；

              - 恶劣天气、安全风险或交通变化明显影响即将执行的安排；

              - 根据可靠路线结果，用户很可能无法按时到达；

              - 其他需要用户现在调整、出发或避险的明确事项。


              need_notify=false 的条件：

              - 一切正常；

              - 只有泛泛建议、重复提醒或没有新增信息；

              - 工具不可用、数据不足，无法确认真实变化；

              - 变化与未来待执行行程无关。


              规则：

              1. 不能为了生成通知而夸大风险。

              2. 没有可靠证据时必须返回 false。

              3. true 时 reply 必须说明“发生了什么、影响哪个行程、用户现在做什么”。

              4. false 时 reply 简短记录检查结论，后端不会通知用户。

              5. 最终只输出合法 JSON，不要 Markdown 或思考过程：

              {"reply":"检查结论","need_notify":false}'
          model:
            type: constant
            value:
              completion_params: {}
              mode: chat
              model: deepseek-v4-flash
              model_type: llm
              provider: langgenius/deepseek/deepseek
              type: model-selector
          query:
            type: constant
