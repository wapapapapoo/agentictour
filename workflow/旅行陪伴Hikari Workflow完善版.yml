    - data:
        code: "import json\nimport re\n\n\nDECISIONS = {\"false\", \"chat_recommendation\"\
          , \"itinerary_replan\"}\n\n\ndef main(raw_text: str):\n    text = str(raw_text\
          \ or \"\").strip()\n    text = re.sub(r\"<think>.*?</think>\\s*\", \"\"\
          , text, flags=re.S)\n    text = re.sub(r\"^```(?:json)?\\s*|\\s*```$\",\
          \ \"\", text, flags=re.I).strip()\n    try:\n        payload = json.loads(text)\n\
          \    except Exception:\n        return {\"reply\": text or \"自动检查输出无法解析。\"\
          , \"decision\": \"false\"}\n    if not isinstance(payload, dict):\n    \
          \    return {\"reply\": \"自动检查输出无法解析。\", \"decision\": \"false\"}\n    decision\
          \ = str(payload.get(\"decision\") or \"false\").strip().lower()\n    if\
          \ decision not in DECISIONS:\n        decision = \"false\"\n    return {\n\
          \        \"reply\": str(payload.get(\"reply\") or \"自动检查已完成。\"),\n     \
          \   \"decision\": decision,\n    }"
        code_language: python3
        desc: 规范化模型输出，保证后端获得稳定字段类型
