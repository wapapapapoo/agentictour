    - data:
        code: "import json\nimport re\n\n\ndef _clean(text):\n    text = str(text\
          \ or \"\").strip()\n    text = re.sub(r\"<think>.*?</think>\\s*\", \"\"\
          , text, flags=re.S)\n    text = re.sub(r\"^```(?:json)?\\s*|\\s*```$\",\
          \ \"\", text, flags=re.I)\n    return text.strip()\n\n\ndef main(raw_text:\
          \ str):\n    text = _clean(raw_text)\n    try:\n        payload = json.loads(text)\n\
          \    except Exception:\n        return {\"reply\": \"候选方案输出格式无效，请重新生成。\"\
          , \"cancelled_itinerary_ids\": [], \"itinerary_items\": []}\n\n    if not\
          \ isinstance(payload, dict):\n        return {\"reply\": \"候选方案输出必须是 JSON 对象。\"\
          , \"cancelled_itinerary_ids\": [], \"itinerary_items\": []}\n    reply =\
          \ str(payload.get(\"reply\") or \"候选方案缺少用户说明。\")\n    items = payload.get(\"\
          itinerary_items\")\n    if not isinstance(items, list):\n        items =\
          \ []\n    items = [item for item in items if isinstance(item, dict)]\n \
          \   cancelled = payload.get(\"cancelled_itinerary_ids\")\n    if not isinstance(cancelled,\
          \ list):\n        cancelled = []\n    cancelled = [item for item in cancelled\
          \ if isinstance(item, int) and not isinstance(item, bool)]\n    return {\"\
          reply\": reply, \"cancelled_itinerary_ids\": cancelled, \"itinerary_items\"\
          : items}"
        code_language: python3
        desc: 规范化模型输出，保证后端获得稳定字段类型
