  - description: Agent只读数据库结构说明
    id: 74acbc9f-76ad-4dcb-912e-689799551619
    name: DB_SCHEMA_CONTEXT
    selector:
    - env
    - DB_SCHEMA_CONTEXT
    value: |-
      只允许单条 SELECT，禁止 INSERT、UPDATE、DELETE、DROP、ALTER、SHOW 和 information_schema。只能查询当前用户、当前旅行所需数据，不得读取 users.password_hash。
      时间规则：数据库中的 DATETIME（包括 start_time、end_time、reminder_time、reminded_at、created_at、updated_at）统一存储为 UTC；面向用户和 Agent 的时间统一使用 Asia/Shanghai（UTC+8）。查询后必须先加 8 小时再解释或展示，禁止把数据库原始 UTC 当作北京时间。
      Workflow 输入 tour_id 对应 trips.id，也对应带 trip_id 字段的业务表中的 trip_id；不要使用 tour_schedule，该表不存在。
      users(user_id, username, password_hash[禁止查询], nickname, phone, email, status, created_at, updated_at)
      trips(id, user_id, title, origin_city, destination_city, start_date, end_date, timezone, status, created_at, updated_at)
      itinerary_items(itinerary_id, trip_id, title, place_name, start_time, end_time, itinerary_type, reminder_time, is_initial, reminded_at, status, created_at, updated_at)
      memos(memo_id, trip_id, memo_text, reminder_time, reminded_at, created_at, updated_at)
      ai_advice(advice_id, trip_id, advice_type, parent_advice_id, input_text, reason_text, advice_text, proposed_itinerary_json, result, audit_status, audit_reason, generation_stopped, created_at, updated_at)
      notifications(notification_id, trip_id, user_id, advice_id, category, content, read_at, created_at)
      agent_job_states(job_name, last_run_at)
      user_locations(user_id, latitude, longitude, city, place_name, location_context, updated_at)
      chat_sessions(session_id, trip_id, user_id, title, status, last_message_at, created_at, updated_at)
      chat_messages(message_id, session_id, sender_type, content, message_order, audit_status, audit_reason, created_at, updated_at)
      trip_plan_requests(id, trip_id, user_id, action, origin_city, destination_city, start_date, end_date, people_count, budget_total, interests, hotel_level, transport_preference, pace, special_requirements, created_at, updated_at)
      trip_plan_versions(id, request_id, user_id, version_no, revision_request, workflow_run_id, task_id, plan_json, raw_response_json, created_at)
      plan_likes(id, user_id, plan_id, chunk_ids, created_at)
      plan_knowledge_mappings(id, plan_id, version_id, user_id, dataset_id, document_id, document_name, batch, humanized_text, indexing_status, created_at)
      user_preference_prototypes(id, user_id, vector, chunk_count, created_at)
      blog_materials(id, user_id, title, destination, start_date, end_date, people_count, itinerary_text, food_text, photo_text, expense_text, feeling_text, created_at, updated_at)
      blog_photos(id, material_id, user_id, original_filename, stored_filename, content_type, file_size, created_at)
      blog_generations(id, material_id, user_id, content_type, writing_style, generated_title, generated_content, tags, risk_note, created_at)
    value_type: string
  - description: Agent数据库查询统一规范
    id: 95fdcf34-85f4-41db-ac6b-d64121486a20
    name: DB_QUERY_RULES
    selector:
    - env
    - DB_QUERY_RULES
    value: |-
      1. 只允许执行一条 SELECT；禁止 INSERT、UPDATE、DELETE、REPLACE、DROP、ALTER、TRUNCATE、CREATE、SHOW、DESCRIBE、EXPLAIN、存储过程和多语句。
      2. 只能使用 DB_SCHEMA_CONTEXT 中明确列出的表名和字段名；禁止猜测 tour_schedule 等不存在的表，禁止访问 information_schema。
      3. 禁止 SELECT *，只选择完成当前任务所需字段；禁止查询 users.password_hash 等认证或敏感数据。
      4. Workflow 的 tour_id 对应 trips.id 和其他业务表的 trip_id。涉及旅行的数据必须使用 WHERE trip_id = 当前 tour_id；查询 trips 时使用 WHERE id = 当前 tour_id。不得查询其他旅行。
      5. 查询行程时必须把 UTC 转为北京时间，优先使用：SELECT itinerary_id, trip_id, title, place_name, DATE_FORMAT(DATE_ADD(start_time, INTERVAL 8 HOUR), '%Y-%m-%d %H:%i:%s') AS start_time, DATE_FORMAT(DATE_ADD(end_time, INTERVAL 8 HOUR), '%Y-%m-%d %H:%i:%s') AS end_time, itinerary_type, DATE_FORMAT(DATE_ADD(reminder_time, INTERVAL 8 HOUR), '%Y-%m-%d %H:%i:%s') AS reminder_time, is_initial, status FROM itinerary_items WHERE trip_id = 当前 tour_id ORDER BY start_time ASC
      6. 查询备忘录时必须把 UTC 转为北京时间，优先使用：SELECT memo_id, trip_id, memo_text, DATE_FORMAT(DATE_ADD(reminder_time, INTERVAL 8 HOUR), '%Y-%m-%d %H:%i:%s') AS reminder_time, DATE_FORMAT(DATE_ADD(reminded_at, INTERVAL 8 HOUR), '%Y-%m-%d %H:%i:%s') AS reminded_at FROM memos WHERE trip_id = 当前 tour_id ORDER BY created_at ASC
      7. 自动检查未来行程同样必须先将 start_time、end_time、reminder_time 从 UTC 加 8 小时转换为北京时间，再与 Asia/Shanghai 当前时间比较和输出。
      8. SQL 因表名或字段名失败时，只能依据 DB_SCHEMA_CONTEXT 修正一次；再次失败就停止查询并明确说明数据库暂时不可用，不得继续猜表、探库或泄露工具错误详情。
      9. 每个任务最多调用数据库工具两次。最终回复只呈现查询结论，不输出 SQL、数据库连接信息、工具调用过程或内部思考。
    value_type: string
