tun:
  enable: true
  stack: gvisor
  dns-hijack:
    - any:53

mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
unified-delay: true
external-controller: '127.0.0.1:9090'
dns:
    enable: true
    listen: '0.0.0.0:1053'
    ipv6: true
    enhanced-mode: fake-ip
    fake-ip-range: 28.0.0.1/8
    fake-ip-filter: ['rule-set:fakeip-filter_domain', 'rule-set:private_domain']
    fake-ip-filter-mode: blacklist
    use-hosts: false
    use-system-hosts: false
    default-nameserver: [223.5.5.5, 119.29.29.29, 180.184.1.1]
    nameserver: ['https://1.1.1.1/dns-query', 'https://8.8.8.8/dns-query']
    proxy-server-nameserver: ['https://dns.alidns.com/dns-query', 'https://doh.pub/dns-query']
    nameserver-policy: { 'geosite:cn': ['https://dns.alidns.com/dns-query', 'https://doh.pub/dns-query'] }
    respect-rules: true
    direct-nameserver: ['https://dns.alidns.com/dns-query', 'https://doh.pub/dns-query']
    direct-nameserver-follow-policy: true
