version: '3'

tasks:
  check:
    deps: [backend:check, frontend:check, mcp:check]

  deploy:
    cmds:
      - docker compose up --build -d

  down:
    cmds:
      - docker compose down

  backend:lint:
    dir: backend
    cmds:
      - ruff check .

  backend:typecheck:
    dir: backend
    cmds:
      - mypy main.py

  backend:test:
    dir: backend
    cmds:
      - pytest -v

  backend:check:
    deps: [backend:lint, backend:typecheck, backend:test]

  frontend:lint:
    dir: frontend
    cmds:
      - npm run lint

  frontend:typecheck:
    dir: frontend
    cmds:
      - npm run type-check

  frontend:test:
    dir: frontend
    cmds:
      - npm run test

  frontend:check:
    deps: [frontend:lint, frontend:typecheck, frontend:test]

  mcp:lint:
    dir: mcp
    cmds:
      - ruff check .

  mcp:typecheck:
    dir: mcp
    cmds:
      - mypy travel_mcp

  mcp:test:
    dir: mcp
    cmds:
      - pytest -v

  mcp:check:
    deps: [mcp:lint, mcp:typecheck, mcp:test]

  backend:dev:
    desc: Start backend with hot-reload
    dir: backend
    cmds:
      - uvicorn main:app --host 127.0.0.1 --port 8000 --reload --log-level debug

  mcp:dev:
    desc: Start MCP server
    dir: mcp
    cmds:
      - python -m travel_mcp.server

  frontend:dev:
    desc: Start frontend dev server
    dir: frontend
    cmds:
      - npm run dev

  default:
    deps: [check]
